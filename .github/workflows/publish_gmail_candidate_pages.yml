name: Publish Gmail Candidate Pages

on:
  workflow_dispatch:
    inputs:
      gmail_query:
        description: Gmail search query override
        required: false
        type: string
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  scan-and-publish:
    runs-on: ubuntu-latest
    env:
      GMAIL_CANDIDATE_NONINTERACTIVE: "1"
      GMAIL_CANDIDATE_TOKEN_JSON: ${{ secrets.GMAIL_CANDIDATE_TOKEN_JSON }}
      GMAIL_SCAN_QUERY: ${{ inputs.gmail_query || vars.GMAIL_SCAN_QUERY || 'in:anywhere -in:chats newer_than:2d' }}
      GMAIL_WEEKLY_SUMMARY_QUERY: ${{ vars.GMAIL_WEEKLY_SUMMARY_QUERY || 'in:anywhere -in:chats newer_than:7d' }}
      RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      CALENDAR_NAME: Email-Derived Events
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '465' }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      OPERATOR_EMAIL_TO: ${{ secrets.OPERATOR_EMAIL_TO }}
      OPERATOR_EMAIL_FROM: ${{ secrets.OPERATOR_EMAIL_FROM || secrets.SMTP_USERNAME }}
    steps:
      - name: Check out default branch
        uses: actions/checkout@v4

      - name: Generate run ID
        run: echo "RUN_ID=$(date -u +%Y%m%d_%H%M%S)" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run discovery
        run: |
          gmail-candidate-scan discover \
            --query "${GMAIL_SCAN_QUERY}" \
            --run-id "${RUN_ID}"

      - name: Run calendar preview
        run: |
          gmail-candidate-scan calendar-preview \
            --query "${GMAIL_SCAN_QUERY}" \
            --calendar-name "${CALENDAR_NAME}" \
            --run-id "${RUN_ID}"

      - name: Run calendar create
        run: |
          gmail-candidate-scan calendar-create \
            --query "${GMAIL_SCAN_QUERY}" \
            --calendar-name "${CALENDAR_NAME}" \
            --run-id "${RUN_ID}"

      - name: Upload private operator artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gmail-candidate-output-${{ env.RUN_ID }}
          path: output/

      - name: Decide weekly email schedule
        run: |
          if [ "$(TZ=Europe/Berlin date +%u)" = "1" ]; then
            echo "WEEKLY_EMAIL_ENABLED=1" >> "$GITHUB_ENV"
          else
            echo "WEEKLY_EMAIL_ENABLED=0" >> "$GITHUB_ENV"
          fi

      - name: Build weekly discovery summary
        if: ${{ env.WEEKLY_EMAIL_ENABLED == '1' && env.SMTP_HOST != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.OPERATOR_EMAIL_TO != '' }}
        run: |
          gmail-candidate-scan discover \
            --query "${GMAIL_WEEKLY_SUMMARY_QUERY}" \
            --output output/weekly_candidates.csv \
            --report output/weekly_candidates.html \
            --json-report output/weekly_candidates.json \
            --run-id "${RUN_ID}-weekly"

      - name: Package weekly review bundle for email
        if: ${{ env.WEEKLY_EMAIL_ENABLED == '1' && env.SMTP_HOST != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.OPERATOR_EMAIL_TO != '' }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          import os

          root = Path("output")
          bundle_path = root / f"gmail-candidate-weekly-review-{os.environ['RUN_ID']}.zip"
          include_paths = [
              root / "weekly_candidates.html",
              root / "weekly_candidates.csv",
              root / "weekly_candidates.json",
          ]

          with zipfile.ZipFile(bundle_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for path in include_paths:
                  if path.exists():
                      archive.write(path, arcname=path.relative_to(root))

          print(f"REVIEW_BUNDLE={bundle_path}")
          with Path(__import__('os').environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
              handle.write(f"REVIEW_BUNDLE={bundle_path}\n")
          PY

      - name: Email weekly review bundle
        if: ${{ env.WEEKLY_EMAIL_ENABLED == '1' && env.SMTP_HOST != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.OPERATOR_EMAIL_TO != '' }}
        env:
          REVIEW_BUNDLE: ${{ env.REVIEW_BUNDLE }}
          GMAIL_WEEKLY_SUMMARY_QUERY: ${{ env.GMAIL_WEEKLY_SUMMARY_QUERY }}
          RUN_ID: ${{ env.RUN_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          from email.message import EmailMessage
          from pathlib import Path
          import mimetypes
          import os
          import smtplib
          import ssl

          bundle_path = Path(os.environ["REVIEW_BUNDLE"])
          recipient = os.environ["OPERATOR_EMAIL_TO"]
          sender = os.environ["OPERATOR_EMAIL_FROM"]

          message = EmailMessage()
          message["Subject"] = f"Gmail weekly candidate summary {os.environ['RUN_ID']}"
          message["From"] = sender
          message["To"] = recipient
          message.set_content(
              "\n".join(
                  [
                      f"Repository: {os.environ['GITHUB_REPOSITORY']}",
                      f"Run ID: {os.environ['RUN_ID']}",
                      f"Workflow run: https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
                      f"Weekly summary query: {os.environ['GMAIL_WEEKLY_SUMMARY_QUERY']}",
                      "",
                      "Attached ZIP includes the seven-day private candidate summary.",
                  ]
              )
          )

          data = bundle_path.read_bytes()
          mime_type, _ = mimetypes.guess_type(bundle_path.name)
          maintype, subtype = (mime_type or "application/zip").split("/", 1)
          message.add_attachment(data, maintype=maintype, subtype=subtype, filename=bundle_path.name)

          context = ssl.create_default_context()
          with smtplib.SMTP_SSL(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"]), context=context) as server:
              server.login(os.environ["SMTP_USERNAME"], os.environ["SMTP_PASSWORD"])
              server.send_message(message)
          PY

      - name: Check out gh-pages branch
        id: checkout_pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: .gh-pages

      - name: Initialize gh-pages if missing
        if: steps.checkout_pages.outcome != 'success'
        run: |
          mkdir -p .gh-pages
          cd .gh-pages
          git init
          git checkout --orphan gh-pages
          if git remote get-url origin >/dev/null 2>&1; then
            git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          else
            git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          fi

      - name: Build Pages bundle
        run: |
          gmail-candidate-scan pages-build \
            --site-dir docs \
            --output-dir .gh-pages

      - name: Publish gh-pages
        run: |
          cd .gh-pages
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No Pages changes to publish"
            exit 0
          fi
          git commit -m "Publish Gmail candidate run ${RUN_ID}"
          git push -u origin gh-pages
